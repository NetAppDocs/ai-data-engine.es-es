indexpage:
  title: Documentación de AI Data Engine
  summary: La documentación de AI Data Engine proporciona información completa sobre
    la instalación, configuración y gestión de los sistemas AIDE, incluida la catalogación
    de metadatos, la gestión de espacios de trabajo, las colecciones de datos y la
    integración con los flujos de trabajo de AI/ML.
  keywords: aide, ai data engine, ontap, metadata engine, workspaces, data collections,
    vector database, guardrails, dcn, data compute nodes
  lead: NetApp AI Data Engine (AIDE) es una plataforma de clase empresarial diseñada
    para acelerar y simplificar el procesamiento de datos, la gestión y la gobernanza
    impulsados por IA. AIDE transforma datos no estructurados en conjuntos de datos
    estructurados y listos para IA para cargas de trabajo de aprendizaje automático
    y de IA generativa.
